apiVersion: apps/v1
kind: Deployment
metadata:
  name: motor
  namespace: mancala
  labels:
    app: motor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: motor
  template:
    metadata:
      labels:
        app: motor
    spec:
      containers:
        - name: motor
          # Replace with your registry, e.g. ghcr.io/USER/mancala-motor:v1.0.0
          image: ghcr.io/USER/mancala-motor:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: OMP_NUM_THREADS
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: OMP_NUM_THREADS
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
